{% extends 'base.html' %}
{% block title %}Вход — СберБанк{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-left">
        <div class="auth-brand">
            <div class="logo-icon-lg">С</div>
            <span>Сбер</span>
        </div>
        <h2 class="auth-tagline">Ваши финансы<br>всегда рядом</h2>
        <div class="auth-features">
            <div class="auth-feat">✓ Переводы за секунды</div>
            <div class="auth-feat">✓ Управление счетами</div>
            <div class="auth-feat">✓ История операций</div>
        </div>
    </div>
    <div class="auth-right">
        <div class="auth-card">
            <h1 class="auth-title">Вход в СберБанк</h1>
            <p class="auth-sub">Введите email или телефон</p>

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label>Email или телефон</label>
                    <input type="text" name="login" placeholder="+7 (900) 000-00-00 или email" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <div class="input-wrap">
                        <input type="password" name="password" id="pwd" placeholder="Введите пароль" required autocomplete="current-password">
                        <button type="button" class="eye-btn" onclick="togglePwd('pwd', this)">👁</button>
                    </div>
                </div>
                <button type="submit" class="btn-submit">Войти</button>
            </form>

            <div class="auth-divider">или</div>
            <p class="auth-switch">Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a></p>
        </div>
    </div>
</div>
{% endblock %}
